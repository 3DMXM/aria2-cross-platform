name: build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')) }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14]
        compiler: [gcc, clang]
        crypto: [openssl, gnutls]
        bittorrent: [with-bt, without-bt]
        exclude:
          - os: macos-14
            crypto: gnutls
          - crypto: openssl
            bittorrent: without-bt

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Linux setup
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install \
            g++-12 \
            clang-15 \
            autoconf \
            automake \
            autotools-dev \
            autopoint \
            libtool \
            pkg-config \
            libssl-dev \
            libgnutls28-dev \
            libc-ares-dev \
            zlib1g-dev \
            libsqlite3-dev \
            libssh2-1-dev \
            libcppunit-dev
      - name: MacOS setup
        if: runner.os == 'macOS'
        run: |
          brew install cppunit gettext openssl libssh2 c-ares sqlite3 \
            autoconf automake pkg-config libtool
      - name: Setup clang (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'clang'
        run: |
          echo 'CC=clang-15' >> $GITHUB_ENV
          echo 'CXX=clang++-15' >> $GITHUB_ENV
      - name: Setup clang (MacOS)
        if: runner.os == 'macOS' && matrix.compiler == 'clang'
        run: |
          echo 'CC=clang' >> $GITHUB_ENV
          echo 'CXX=clang++' >> $GITHUB_ENV
      - name: Setup gcc (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        run: |
          echo 'CC=gcc-12' >> $GITHUB_ENV
          echo 'CXX=g++-12' >> $GITHUB_ENV
      - name: Setup gcc (MacOS)
        if: runner.os == 'macOS' && matrix.compiler == 'gcc'
        run: |
          echo 'CC=gcc' >> $GITHUB_ENV
          echo 'CXX=g++' >> $GITHUB_ENV
      - name: Libtool
        run: |
          autoreconf -i
      - name: Setup compiler flags
        run: |
          asanflags="-fsanitize=address,undefined -fno-sanitize-recover=undefined"

          CPPFLAGS="$asanflags -g3"
          LDFLAGS="$asanflags"

          echo 'CPPFLAGS='"$CPPFLAGS" >> $GITHUB_ENV
          echo 'LDFLAGS='"$LDFLAGS" >> $GITHUB_ENV
      - name: Disable BitTorrent
        if: matrix.bittorrent == 'without-bt'
        run: |
          FEATURE_FLAGS="$FEATURE_FLAGS --disable-bittorrent"

          echo 'FEATURE_FLAGS='"$FEATURE_FLAGS" >> $GITHUB_ENV
      - name: Configure autotools (Linux, gnutls)
        if: runner.os == 'Linux' && matrix.crypto == 'gnutls'
        run: |
          ./configure --with-gnutls --without-openssl $FEATURE_FLAGS
      - name: Configure autotools (Linux, openssl)
        if: runner.os == 'Linux' && matrix.crypto == 'openssl'
        run: |
          ./configure --without-gnutls --with-openssl $FEATURE_FLAGS
      - name: Configure autotools (macOS)
        if: runner.os == 'macOS'
        run: |
          ./configure \
            --without-openssl --without-gnutls --with-appletls \
            --disable-nls
      - name: Build aria2
        run: |
          make -j"$(nproc 2> /dev/null || sysctl -n hw.ncpu)" check

  metadata:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/release-') }}
    runs-on: ubuntu-22.04
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          release_tag="$RELEASE_TAG"
          version="${release_tag#release-}"
          version="${version#v}"

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build-linux-release:
    needs: metadata
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.release_tag }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            autotools-dev \
            autopoint \
            libtool \
            pkg-config \
            python3-docutils \
            python3-sphinx \
            libssl-dev \
            libc-ares-dev \
            zlib1g-dev \
            libsqlite3-dev \
            libssh2-1-dev \
            libxml2-dev \
            libcppunit-dev \
            xz-utils

      - name: Generate README.html
        run: rst2html.py README.rst README.html

      - name: Build Linux binary
        run: |
          autoreconf -i
          ./configure \
            --with-openssl \
            --without-gnutls \
            --disable-nls \
            --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt
          make -j"$(nproc)"

      - name: Package Linux binary
        run: |
          mkdir -p linux-out
          cp src/aria2c linux-out/
          sh ./linux-release

      - name: Build source archives
        run: make dist-bzip2 dist-gzip dist-xz

      - name: Upload Linux assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-assets
          path: |
            aria2-${{ needs.metadata.outputs.version }}-linux-x86_64-build1.tar.xz
            aria2-${{ needs.metadata.outputs.version }}.tar.bz2
            aria2-${{ needs.metadata.outputs.version }}.tar.gz
            aria2-${{ needs.metadata.outputs.version }}.tar.xz
          if-no-files-found: error

  build-windows-release:
    needs: metadata
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.release_tag }}
          fetch-depth: 1

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-docutils zip

      - name: Generate README.html
        run: rst2html.py README.rst README.html

      - name: Build Windows binary image
        run: |
          docker build \
            --build-arg HOST=x86_64-w64-mingw32 \
            --build-arg ARIA2_VERSION=${{ needs.metadata.outputs.release_tag }} \
            --build-arg ARIA2_REF=refs/tags/${{ needs.metadata.outputs.release_tag }} \
            -t aria2-mingw-x86_64 - < Dockerfile.mingw

      - name: Package Windows binary
        run: |
          mkdir -p mingw-out
          docker run --rm -v "${PWD}/mingw-out:/out" aria2-mingw-x86_64 \
            cp /aria2/src/aria2c.exe /out
          HOST=x86_64-w64-mingw32 LABEL=win-64bit sh ./mingw-release

      - name: Upload Windows assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: aria2-${{ needs.metadata.outputs.version }}-win-64bit-build1.zip
          if-no-files-found: error

  build-macos-release:
    needs: metadata
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.release_tag }}
          fetch-depth: 0

      - name: Install dependencies
        shell: bash
        run: |
          brew install autoconf automake pkg-config libtool gettext gnu-tar
          python3 -m pip install --user docutils sphinx
          echo "$(python3 -m site --user-base)/bin" >> "$GITHUB_PATH"

      - name: Generate README.html
        run: |
          export PATH="$(python3 -m site --user-base)/bin:$PATH"
          rst2html.py README.rst README.html

      - name: Build macOS release packages
        run: |
          export PATH="$(python3 -m site --user-base)/bin:$PATH"
          make -f makerelease-osx.mk

      - name: Upload macOS assets
        uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: |
            aria2-${{ needs.metadata.outputs.version }}-osx-darwin.tar.bz2
            aria2-${{ needs.metadata.outputs.version }}-osx-darwin.pkg
            aria2-${{ needs.metadata.outputs.version }}-osx-darwin.dmg
          if-no-files-found: error

  publish:
    needs:
      - metadata
      - build-linux-release
      - build-windows-release
      - build-macos-release
    runs-on: ubuntu-22.04

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          name: aria2 ${{ needs.metadata.outputs.version }}
          files: release-assets/*
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
